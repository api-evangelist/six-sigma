aid: six-sigma
url: https://raw.githubusercontent.com/api-evangelist/six-sigma/refs/heads/main/apis.yml
name: Six Sigma
kind: topic
description: >-
  Six Sigma is a data-driven process improvement methodology that uses statistical
  analysis to reduce defects and variability in business processes, targeting fewer
  than 3.4 defects per million opportunities. Organizations across manufacturing,
  healthcare, finance, and technology adopt Six Sigma frameworks (DMAIC for improvement,
  DMADV for design) to drive quality excellence, reduce costs, and improve customer
  satisfaction. APIs in this domain connect quality management systems, statistical
  analysis tools, process mining platforms, and business intelligence systems.
tags:
  - Quality Management
  - Process Improvement
  - Lean Manufacturing
  - Business Excellence
  - Statistical Analysis
  - DMAIC
  - Operational Excellence
created: '2025'
modified: '2026-05-02'

apis:
  - aid: six-sigma:asq-api
    name: American Society for Quality (ASQ) API
    description: >-
      The American Society for Quality (ASQ) is the leading global authority on
      quality management and Six Sigma certification. The ASQ provides resources,
      certifications (Black Belt, Green Belt, Yellow Belt), and body of knowledge
      publications that define the Six Sigma methodology standards. ASQ developer
      resources include member data APIs and certification verification services.
    humanURL: https://asq.org/quality-resources/six-sigma
    baseURL: https://asq.org
    tags:
      - Quality Management
      - Certification
      - Six Sigma
      - Standards
    properties:
      - url: https://asq.org/quality-resources/six-sigma
        type: Documentation
      - url: https://asq.org
        type: Website

  - aid: six-sigma:minitab-api
    name: Minitab Statistical Software API
    description: >-
      Minitab is the leading statistical software platform used by Six Sigma
      practitioners for data analysis, control charts, capability analysis, and
      hypothesis testing. Minitab provides APIs and automation interfaces for
      integrating statistical analysis into quality management workflows, enabling
      automated report generation, data import from manufacturing systems, and
      integration with enterprise quality platforms.
    humanURL: https://www.minitab.com/en-us/products/minitab/
    baseURL: https://api.minitab.com
    tags:
      - Statistical Analysis
      - Quality Management
      - Process Control
      - Data Analysis
    properties:
      - url: https://www.minitab.com/en-us/products/minitab/
        type: Documentation
      - url: https://www.minitab.com
        type: Website

  - aid: six-sigma:isixsigma-api
    name: iSixSigma Community API
    description: >-
      iSixSigma is the leading online community and resource hub for Six Sigma
      practitioners, providing training content, project templates, DMAIC guides,
      and community forums. The platform serves quality professionals with knowledge
      resources, case studies, and practitioner tools for implementing Six Sigma
      projects across industries.
    humanURL: https://www.isixsigma.com
    baseURL: https://www.isixsigma.com
    tags:
      - Community
      - Training
      - Six Sigma
      - Quality Management
    properties:
      - url: https://www.isixsigma.com
        type: Website

